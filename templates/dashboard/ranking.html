{% extends 'base.html' %}

{% block content %}

<h2>{{ job.title }}</h2>

<table class="table table-hover">

<tr>
    <th>Rank</th>
    <th>Candidate</th>
    <th>Score</th>
</tr>

{% for app in applications %}

<tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ app.candidate.name }}</td>
    <td>{{ app.ai_score }}%</td>
</tr>

{% endfor %}

</table>

{% endblock %}
