{% extends 'base.html' %}

{% block content %}

<h2>Skill Gap Analysis</h2>

<div class="row">

<div class="col-md-6">

<h4>Matched Skills</h4>

<ul class="list-group">

{% for skill in matched %}
<li class="list-group-item">
    ✓ {{ skill }}
</li>
{% endfor %}

</ul>

</div>

<div class="col-md-6">

<h4>Missing Skills</h4>

<ul class="list-group">

{% for skill in missing %}
<li class="list-group-item">
    ✗ {{ skill }}
</li>
{% endfor %}

</ul>

</div>

</div>

{% endblock %}
