services:
  - type: web
    name: ai-recruitment-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: ai-recruitment-assistant.onrender.com

      - key: GEMINI_API_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

  - type: worker
    name: ai-recruitment-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A config worker -l info

    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: ai-recruitment-assistant
          envVarKey: SECRET_KEY

      - key: DEBUG
        value: "False"

      - key: GEMINI_API_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: recruitment-redis
          property: connectionString

databases:
  - name: recruitment-db

redis:
  - name: recruitment-redis